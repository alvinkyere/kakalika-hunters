<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanctuary Host</title>
    <!-- Add Tailwind via CDN for quick styling since you used tailwind classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Fallbacks for your custom class names */
      .caption-display { padding: 20px; font-size: 1.5rem; background: #1f2937; border-radius: 12px; min-height: 400px; display: flex; flex-direction: column; overflow-y: auto; }
      .caption-empty { color: #888; font-style: italic; align-items: center; justify-content: center; display: flex; }
      .caption-final { color: #fff; }
      .caption-partial { color: #9ca3af; }
      .qr-card { background: white; padding: 20px; border-radius: 12px; text-align: center; height: 100%; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
      .qr-label { font-size: 1.25rem; margin-bottom: 20px; font-weight: bold; }
      .qr-code-wrapper { display: flex; justify-content: center; margin-bottom: 16px; }
      .qr-session-id { margin-top: 10px; font-weight: bold; font-family: monospace; font-size: 1.1rem; }
      .qr-url { display: none; }
      .session-controls { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: white; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
      .listener-count { display: flex; flex-direction: column; }
      .listener-number { font-size: 2.5rem; font-weight: 800; line-height: 1; }
      .listener-label { font-size: 0.875rem; color: #6b7280; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; margin-top: 4px; }
      .btn-end { background: #ef4444; color: white; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.2s; }
      .btn-end:hover { background: #dc2626; }
      .confirm-end p { font-weight: bold; margin-bottom: 8px; }
      .confirm-buttons { display: flex; gap: 8px; }
      .btn-confirm-yes { background: #ef4444; color: white; padding: 8px 16px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
      .btn-confirm-no { background: #e5e7eb; color: #374151; padding: 8px 16px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
    </style>
  </head>
  <body class="bg-gray-100 antialiased text-gray-900">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
